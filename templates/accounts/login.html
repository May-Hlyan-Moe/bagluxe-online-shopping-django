{% extends 'base.html' %}
{% block title %}Login - BagLuxe{% endblock %}
{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="auth-card">
        <div class="text-center mb-4">
          <div style="font-size:2.5rem;color:var(--pink-primary);">&#9825;</div>
          <h2 class="auth-title">Welcome Back</h2>
          <p class="text-muted small">Login to your BagLuxe account</p>
        </div>
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Your username" autofocus/>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Your password"/>
          </div>
          {% if form.non_field_errors %}
          <div class="alert alert-danger">{{ form.non_field_errors.0 }}</div>
          {% endif %}
          <button type="submit" class="btn btn-pink w-100 py-2">Login</button>
        </form>
        <p class="text-center text-muted small mt-3">
          New to BagLuxe? <a href="/accounts/register/" style="color:var(--pink-dark);">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
